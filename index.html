<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Me, Inc. Advanced KPI Tracker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard Variable', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            main { margin: 0 !important; padding: 0 !important; max-width: 100% !important; }
            .print-shadow-none { box-shadow: none !important; border: none !important; }
            .print-break-inside-avoid { break-inside: avoid; }
            .print-mt-8 { margin-top: 2rem !important; }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const initialKPIs = [
            { id: 1, title: '파이썬 데이터 분석 인강 완강', category: 'productive', progress: 8, target: 10, unit: '강' },
            { id: 2, title: '타 전공(IT/경영) 학생과 정보 교류', category: 'transformational', progress: 1, target: 3, unit: '회' },
            { id: 3, title: '주 3회 30분 규칙적인 달리기', category: 'vitality', progress: 10, target: 12, unit: '회' },
            { id: 4, title: '포기하고 싶을 때 5분 더 버티기 (GRIT)', category: 'grit', progress: 3, target: 5, unit: '회' },
        ];

        const defaultProfile = {
            name: '김물류',
            studentId: '20260001',
            yearSemester: '1학년 2학기',
            regionGoal: '스마트 항만 SCM 기획자'
        };

        // Inventory-Process-Network 패러다임으로 Category 라벨 업데이트
        const categoryInfo = {
            productive: { name: 'Inventory (지식 비축)', icon: 'fa-boxes-stacked', color: 'text-blue-600', bg: 'bg-blue-100', border: 'border-blue-200' },
            transformational: { name: 'Network (생태계 연결)', icon: 'fa-globe', color: 'text-emerald-600', bg: 'bg-emerald-100', border: 'border-emerald-200' },
            vitality: { name: 'Inventory (에너지 비축)', icon: 'fa-heart-pulse', color: 'text-amber-600', bg: 'bg-amber-100', border: 'border-amber-200' },
            grit: { name: 'Process (실행과 가공)', icon: 'fa-fire-flame-curved', color: 'text-orange-600', bg: 'bg-orange-100', border: 'border-orange-200' }
        };

        const strategyFeedback = {
            SA: {
                title: "Scale-up & Agile Prototyping (확장 및 애자일 전환)",
                icon: "fa-rocket",
                color: "text-blue-700",
                bg: "bg-blue-50",
                borderColor: "border-blue-200",
                desc: "현재의 통제(Controlling) 시스템이 완벽하게 작동하고 있습니다. 양적 비축(Inventory)을 달성했으니, 이제 질적 가공(Process)으로 전환(Pivot)해야 할 시점입니다.",
                actions: [
                    "공공데이터 API를 활용해 직접 작은 실패(Small Fail)가 있는 데이터 분석 프로젝트(Process)를 시도해 보십시오.",
                    "학과 내 교류를 넘어, 링크드인(LinkedIn)을 통해 글로벌 현직자에게 네트워크(Network)를 과감히 확장하십시오."
                ],
                refTitle: "Eric Ries, 《The Lean Startup》",
                refDesc: "완벽한 지식을 쌓을 때까지 기다리지 말고, 최소 기능 제품(MVP)이라도 시장(기업, SNS)에 빠르게 던져 피드백(Build-Measure-Learn)을 받으라는 경영 전략."
            },
            B: {
                title: "Theory of Constraints (제약이론 기반 병목현상 타파)",
                icon: "fa-link-slash",
                color: "text-amber-700",
                bg: "bg-amber-50",
                borderColor: "border-amber-200",
                desc: "계획은 좋았으나 자원 배분(Organizing)이 지연되고 있습니다. 공급망(SCM) 전체의 속도는 가장 느린 병목이 결정합니다. 내 실행력(Process)을 갉아먹는 '병목(Bottleneck)'이 무엇인지 파악해야 합니다.",
                actions: [
                    "달성률이 유독 낮은 KPI의 원인을 '시간 부족'이라는 변명 대신 '스마트폰 중독' 등 근본 원인으로 재정의하십시오.",
                    "목표 재설정: 너무 많은 목표가 병목이라면, 'Inventory 1개', 'GRIT(Process) 1개'로 핵심 과제(Core Task)를 대폭 축소하여 역량을 집중하십시오."
                ],
                refTitle: "Eliyahu M. Goldratt, 《The Goal》 (제약이론)",
                refDesc: "조직의 목표 달성을 방해하는 제약 조건(Constraint)을 찾아내고, 다른 프로세스를 그에 맞춰 통제함으로써 시스템 산출량을 극대화하는 생산 관리 원리."
            },
            C: {
                title: "Feedforward Control (사전 통제 및 플랜 재구축)",
                icon: "fa-triangle-exclamation",
                color: "text-red-700",
                bg: "bg-red-50",
                borderColor: "border-red-200",
                desc: "의지(GRIT) 부족이 아니라, 최초의 계획(Planning) 자체가 비현실적(Unrealistic)이었을 확률이 높습니다. 결과가 나온 뒤 후회하는 '사후 통제'는 늦습니다. 실패 원인을 미리 차단하는 '사전 통제'가 필요합니다.",
                actions: [
                    "[목표 분할] '토익 850점' 같은 거대한 KPI를 버리십시오. '매일 아침 10분, RC 1지문 풀기'와 같이 가장 작은 단위의 의도적 연습으로 쪼개십시오.",
                    "[활력 우선] 당분간 지식 비축 목표의 비중을 낮추고, 무너진 체력과 수면 패턴(Inventory 에너지) 복구를 최우선 KPI로 설정하십시오."
                ],
                refTitle: "Stephen P. Robbins, 《Management》 & James Clear, 《Atomic Habits》",
                refDesc: "통제의 3유형 중 '사전 통제(Feedforward Control)'. 문제가 발생하기 전에 투입물을 엄격히 관리하여 오류를 예방하는 가장 이상적인 통제 기법."
            }
        };

        const assetDeepDive = [
            {
                key: 'productive',
                title: '지식의 비축 (Inventory)',
                icon: 'fa-boxes-stacked',
                subtitle: '"이론 조달에서 기술 확보로"',
                desc: '전공 책만 읽는 것은 원자재를 창고에 쌓아두는 것과 같습니다. Python, SQL 등 도구(Tool)를 내 머릿속 창고에 단단히 비축(Inventory)하십시오.'
            },
            {
                key: 'grit',
                title: '실행과 가공 (Process)',
                icon: 'fa-fire-flame-curved',
                subtitle: '"포기를 모르는 가공의 엔진, GRIT"',
                desc: '훌륭한 지식(Inventory)도 실행의 고통을 견디지 못하면 쓸모가 없습니다. 포기하고 싶은 순간을 극복하는 나만의 If-Then 시나리오를 가동하여 가치를 융합(Process)하십시오.'
            },
            {
                key: 'transformational',
                title: '생태계 연결 (Network)',
                icon: 'fa-globe',
                subtitle: '"약한 연결(Weak Ties)의 힘"',
                desc: '마크 그라노베터의 이론처럼, 커리어의 결정적 기회는 매일 보는 동기들이 아니라 타 전공생이나 실무자 등 이질적인 생태계(Network)와의 연결에서 옵니다.'
            },
            {
                key: 'vitality',
                title: '에너지 비축 (Inventory)',
                icon: 'fa-heart-pulse',
                subtitle: '"번아웃은 Life SCM 최악의 리스크"',
                desc: '100세 시대의 다단계 삶은 마라톤입니다. KPI를 달성하고도 건강을 잃었다면 파산입니다. 충분한 수면과 숏폼 시청 시간 단축으로 에너지를 비축하십시오.'
            }
        ];

        function App() {
            const [kpis, setKpis] = useState(() => {
                const saved = localStorage.getItem('meIncKpisAdvV2');
                return saved ? JSON.parse(saved) : initialKPIs;
            });
            const [profile, setProfile] = useState(() => {
                const saved = localStorage.getItem('meIncProfileAdvV2');
                return saved ? JSON.parse(saved) : defaultProfile;
            });

            const [activeTab, setActiveTab] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            const [editingKpiId, setEditingKpiId] = useState(null);
            
            const [newKpi, setNewKpi] = useState({ title: '', category: 'productive', target: 10, unit: '회' });
            const [tempProfile, setTempProfile] = useState(profile);

            useEffect(() => { localStorage.setItem('meIncKpisAdvV2', JSON.stringify(kpis)); }, [kpis]);
            useEffect(() => { localStorage.setItem('meIncProfileAdvV2', JSON.stringify(profile)); }, [profile]);

            const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(''), 3000); };

            const handleProgress = (id, increment) => {
                setKpis(kpis.map(kpi => {
                    if (kpi.id === id) {
                        const newProgress = Math.max(0, Math.min(kpi.target, kpi.progress + increment));
                        if (newProgress === kpi.target && kpi.progress !== kpi.target) showToast(`'${kpi.title}' 목표 달성! 🎉`);
                        return { ...kpi, progress: newProgress };
                    }
                    return kpi;
                }));
            };

            const handleSubmitKpi = (e) => {
                e.preventDefault();
                if (!newKpi.title.trim()) return;
                if (editingKpiId) {
                    setKpis(kpis.map(kpi => kpi.id === editingKpiId ? { ...kpi, ...newKpi, target: Number(newKpi.target), progress: Math.min(kpi.progress, Number(newKpi.target)) } : kpi));
                    showToast('수정 완료되었습니다.');
                } else {
                    setKpis([...kpis, { id: Date.now(), ...newKpi, target: Number(newKpi.target), progress: 0 }]);
                    showToast('새 KPI가 등록되었습니다.');
                }
                setIsModalOpen(false); setEditingKpiId(null);
            };

            const handleDeleteKpi = (id) => {
                if(window.confirm('삭제하시겠습니까?')) { setKpis(kpis.filter(kpi => kpi.id !== id)); setIsModalOpen(false); showToast('삭제되었습니다.'); }
            };

            const handleSaveProfile = (e) => { e.preventDefault(); setProfile(tempProfile); setIsProfileModalOpen(false); showToast('프로필 저장 완료'); };

            const getOverallProgress = () => {
                const tTarget = kpis.reduce((a, c) => a + c.target, 0);
                return tTarget === 0 ? 0 : Math.round((kpis.reduce((a, c) => a + c.progress, 0) / tTarget) * 100);
            };

            const getGrade = (percent) => {
                if(percent >= 80) return { letter: 'S/A', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-200', desc: '우수 (계획대로 순항 중)', strategyKey: 'SA' };
                if(percent >= 60) return { letter: 'B', color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-200', desc: '보통 (실행력 보완 필요)', strategyKey: 'B' };
                return { letter: 'C', color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-200', desc: '미흡 (전면 재검토 요망)', strategyKey: 'C' };
            };

            const overallProgress = getOverallProgress();
            const currentGrade = getGrade(overallProgress);
            const currentStrategy = strategyFeedback[currentGrade.strategyKey];

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 pb-20 md:pb-0">
                    {/* Header */}
                    <header className="bg-slate-900 text-white p-5 md:p-6 shadow-md rounded-b-2xl sticky top-0 z-30 no-print">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div>
                                <p className="text-blue-400 font-semibold text-xs tracking-wider mb-1 font-montserrat">Me, Inc. Life SCM Tracker</p>
                                <h1 className="text-xl md:text-2xl font-bold flex items-center gap-2">
                                    <i className="fa-solid fa-bullseye text-blue-400"></i> 경영 대시보드
                                </h1>
                            </div>
                            <div className="cursor-pointer group p-2 hover:bg-slate-800 rounded-lg transition-colors" onClick={() => {setTempProfile(profile); setIsProfileModalOpen(true);}}>
                                <p className="text-slate-400 text-xs md:text-sm group-hover:text-blue-300 flex items-center justify-end gap-1">
                                    <i className="fa-solid fa-pen-to-square"></i> {profile.name} <span className="hidden md:inline">CEO</span>
                                </p>
                                <p className="font-medium text-sm md:text-base text-white">{profile.yearSemester}</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:p-6">
                        {/* Tab Nav */}
                        <div className="hidden md:flex gap-3 mb-6 bg-white p-2 rounded-xl shadow-sm border border-slate-200 no-print">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-3 rounded-lg font-bold flex justify-center gap-2 ${activeTab==='dashboard'?'bg-slate-900 text-white':'text-slate-500 hover:bg-slate-50'}`}><i className="fa-solid fa-chart-pie"></i> 현황 통제</button>
                            <button onClick={() => setActiveTab('tasks')} className={`flex-1 py-3 rounded-lg font-bold flex justify-center gap-2 ${activeTab==='tasks'?'bg-slate-900 text-white':'text-slate-500 hover:bg-slate-50'}`}><i className="fa-solid fa-check-double"></i> KPI 실행/수정</button>
                            <button onClick={() => setActiveTab('report')} className={`flex-1 py-3 rounded-lg font-bold flex justify-center gap-2 ${activeTab==='report'?'bg-blue-600 text-white shadow-md':'text-slate-500 hover:bg-slate-50'}`}><i className="fa-solid fa-file-contract"></i> 심화 성과 보고서</button>
                        </div>

                        {/* Dashboard */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                                    <h2 className="text-lg font-bold text-slate-700 mb-2">이번 학기 종합 달성률</h2>
                                    <div className="relative w-32 h-32 mx-auto my-4">
                                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                            <path className="text-slate-100" strokeWidth="3" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                            <path className="text-blue-600" strokeWidth="3" strokeDasharray={`${overallProgress}, 100`} fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" style={{ transition: 'stroke-dasharray 0.5s' }} />
                                        </svg>
                                        <div className="absolute inset-0 flex items-center justify-center"><span className="text-3xl font-black text-slate-800">{overallProgress}%</span></div>
                                    </div>
                                </div>
                                <h3 className="font-bold text-slate-800 text-xl mt-8 mb-4">Life SCM 자산 구축 현황</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {Object.entries(categoryInfo).map(([catKey, info]) => {
                                        const p = kpis.filter(k=>k.category===catKey).reduce((a,c)=>a+c.progress,0);
                                        const t = kpis.filter(k=>k.category===catKey).reduce((a,c)=>a+c.target,0);
                                        const pct = t===0?0:Math.round((p/t)*100);
                                        return (
                                            <div key={catKey} className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
                                                <div className="flex flex-col items-start gap-2 mb-4">
                                                    <div className={`w-10 h-10 flex items-center justify-center rounded-xl ${info.bg} ${info.color}`}><i className={`fa-solid ${info.icon} text-lg`}></i></div>
                                                    <h4 className="font-bold text-slate-700 text-sm">{info.name}</h4>
                                                </div>
                                                <div>
                                                    <div className="text-2xl font-bold mb-2">{pct}%</div>
                                                    <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden"><div className={`h-2 rounded-full ${info.color.replace('text','bg')}`} style={{width:`${pct}%`}}></div></div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Tasks */}
                        {activeTab === 'tasks' && (
                            <div className="space-y-4 animate-in fade-in">
                                <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-slate-200">
                                    <h2 className="font-bold text-slate-800">나의 KPI 리스트</h2>
                                    <button onClick={() => {setEditingKpiId(null); setNewKpi({title:'', category:'productive', target:10, unit:'회'}); setIsModalOpen(true);}} className="bg-slate-900 text-white px-3 py-1.5 rounded-lg text-sm font-bold"><i className="fa-solid fa-plus"></i> 추가</button>
                                </div>
                                {kpis.map(kpi => {
                                    const info = categoryInfo[kpi.category];
                                    const isComp = kpi.progress === kpi.target;
                                    const percent = Math.round((kpi.progress / kpi.target) * 100);
                                    return (
                                        <div key={kpi.id} className={`bg-white p-4 rounded-xl border shadow-sm flex items-center gap-4 ${isComp ? 'border-green-200 bg-green-50/30' : 'border-slate-200'}`}>
                                            <div className={`w-10 h-10 flex items-center justify-center rounded-lg ${isComp ? 'bg-green-100 text-green-600' : info.bg + ' ' + info.color}`}>
                                                <i className={`fa-solid ${isComp ? 'fa-check' : info.icon}`}></i>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded border ${info.bg} ${info.color} ${info.border}`}>{info.name}</span>
                                                <h3 className={`font-bold mt-1 truncate ${isComp ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{kpi.title}</h3>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div className={`h-full ${isComp?'bg-green-500':info.color.replace('text','bg')}`} style={{width:`${percent}%`}}></div></div>
                                                    <span className="text-xs font-bold text-slate-500 w-12 text-right">{kpi.progress}/{kpi.target}</span>
                                                </div>
                                            </div>
                                            <div className="flex flex-col gap-1 items-end">
                                                <button onClick={() => {setEditingKpiId(kpi.id); setNewKpi(kpi); setIsModalOpen(true);}} className="text-slate-400 hover:text-blue-600 p-1"><i className="fa-solid fa-pen text-sm"></i></button>
                                                <div className="flex gap-1">
                                                    <button onClick={()=>handleProgress(kpi.id, -1)} disabled={kpi.progress===0} className="w-7 h-7 bg-slate-100 rounded-md text-slate-600 font-bold">-</button>
                                                    <button onClick={()=>handleProgress(kpi.id, 1)} disabled={isComp} className="w-7 h-7 bg-slate-900 text-white rounded-md font-bold">+</button>
                                                </div>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        )}

                        {/* Report (Advanced Feedback) */}
                        {activeTab === 'report' && (
                            <div className="print-shadow-none bg-white p-5 md:p-8 rounded-2xl shadow-sm border border-slate-200 animate-in fade-in">
                                <div className="border-b-2 border-slate-900 pb-5 mb-6 flex flex-col md:flex-row justify-between md:items-end gap-4">
                                    <div>
                                        <p className="text-blue-600 font-bold text-sm tracking-widest font-montserrat mb-1">LIFE SCM POST-REPORT</p>
                                        <h2 className="text-2xl md:text-3xl font-black text-slate-900">Me, Inc. 심화 성과 보고서</h2>
                                        <p className="text-slate-600 mt-1 font-medium">{profile.yearSemester} | 목표: {profile.regionGoal}</p>
                                    </div>
                                    <div className="text-left md:text-right bg-slate-50 p-3 rounded-lg border border-slate-200">
                                        <p className="font-bold text-lg">{profile.name} <span className="text-sm font-normal text-slate-500">CEO</span></p>
                                        <button onClick={()=>window.print()} className="no-print mt-2 w-full bg-slate-900 hover:bg-blue-600 text-white px-3 py-1.5 rounded-md font-bold text-sm transition-colors"><i className="fa-solid fa-print"></i> PDF 저장</button>
                                    </div>
                                </div>

                                {/* 종합 평가 카드 */}
                                <div className="flex flex-col md:flex-row gap-4 mb-8 print-break-inside-avoid">
                                    <div className="md:w-1/3 bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col items-center justify-center">
                                        <h3 className="text-sm font-bold text-slate-500 mb-2">이번 학기 종합 달성률</h3>
                                        <div className="text-5xl font-black text-slate-900 mb-2">{overallProgress}%</div>
                                        <div className={`px-4 py-1 rounded-full text-sm font-bold ${currentGrade.bg} ${currentGrade.color} ${currentGrade.border} border`}>
                                            등급: {currentGrade.letter}
                                        </div>
                                    </div>
                                    
                                    {/* 동적 AI 컨설팅 피드백 */}
                                    <div className={`md:w-2/3 p-6 rounded-xl border ${currentStrategy.bg} ${currentStrategy.borderColor}`}>
                                        <h3 className={`font-bold text-lg mb-2 flex items-center gap-2 ${currentStrategy.color}`}>
                                            <i className={`fa-solid ${currentStrategy.icon}`}></i> {currentStrategy.title}
                                        </h3>
                                        <p className="text-slate-700 text-sm mb-4 leading-relaxed">
                                            {currentStrategy.desc}
                                        </p>
                                        <div className="bg-white p-4 rounded-lg border border-white/50 shadow-sm">
                                            <strong className={`block text-sm mb-2 ${currentStrategy.color}`}>💡 경영학 기반 실무 액션 플랜</strong>
                                            <ul className="text-sm text-slate-600 space-y-2">
                                                {currentStrategy.actions.map((act, idx) => (
                                                    <li key={idx} className="flex gap-2"><i className="fa-solid fa-check mt-1 opacity-50"></i><span>{act}</span></li>
                                                ))}
                                            </ul>
                                        </div>
                                        <div className="mt-4 pt-3 border-t border-black/5 text-xs text-slate-500 flex gap-2">
                                            <i className="fa-solid fa-book mt-0.5"></i>
                                            <div><strong>Reference:</strong> {currentStrategy.refTitle} <br/> <span>{currentStrategy.refDesc}</span></div>
                                        </div>
                                    </div>
                                </div>

                                {/* KPI 세부 내역 */}
                                <h3 className="font-bold text-lg text-slate-800 mb-3 border-l-4 border-slate-900 pl-3">부문별 KPI 실적</h3>
                                <div className="overflow-x-auto mb-8 print-break-inside-avoid border border-slate-200 rounded-xl">
                                    <table className="w-full text-left text-sm min-w-[500px]">
                                        <thead className="bg-slate-50 border-b border-slate-200">
                                            <tr>
                                                <th className="p-3 font-bold text-slate-600">카테고리</th>
                                                <th className="p-3 font-bold text-slate-600">SMART 목표명</th>
                                                <th className="p-3 font-bold text-center text-slate-600">실적 / 목표</th>
                                                <th className="p-3 font-bold text-center text-slate-600">달성률</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {kpis.map(kpi => {
                                                const info = categoryInfo[kpi.category];
                                                const pct = Math.round((kpi.progress/kpi.target)*100);
                                                return (
                                                    <tr key={kpi.id} className="border-b border-slate-100 last:border-0">
                                                        <td className="p-3"><span className={`px-2 py-1 rounded text-[11px] font-bold whitespace-nowrap ${info.bg} ${info.color}`}>{info.name}</span></td>
                                                        <td className="p-3 font-medium text-slate-800">{kpi.title}</td>
                                                        <td className="p-3 text-center text-slate-600 whitespace-nowrap">{kpi.progress} / {kpi.target}</td>
                                                        <td className="p-3 text-center font-bold text-slate-900">{pct}%</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>

                                {/* 4대 무형 자산 딥다이브 */}
                                <h3 className="font-bold text-lg text-slate-800 mb-4 border-l-4 border-blue-600 pl-3 print-mt-8">Life SCM 실무 고도화 지침</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print-break-inside-avoid">
                                    {assetDeepDive.map((asset, idx) => {
                                        const info = categoryInfo[asset.key];
                                        return (
                                            <div key={idx} className="border border-slate-200 rounded-xl p-5 bg-white flex gap-4">
                                                <div className={`w-12 h-12 flex-shrink-0 rounded-lg flex items-center justify-center ${info.bg} ${info.color}`}>
                                                    <i className={`fa-solid ${asset.icon} text-xl`}></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-slate-800 mb-1">{asset.title}</h4>
                                                    <p className={`text-xs font-bold mb-2 ${info.color}`}>{asset.subtitle}</p>
                                                    <p className="text-xs text-slate-600 leading-relaxed">{asset.desc}</p>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Mobile Nav */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center p-2 pb-safe z-40 no-print">
                        <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center w-16 py-1 ${activeTab==='dashboard'?'text-blue-600':'text-slate-400'}`}><i className="fa-solid fa-chart-pie"></i><span className="text-[10px] mt-1 font-bold">현황</span></button>
                        <button onClick={()=>setActiveTab('tasks')} className={`flex flex-col items-center w-16 py-1 ${activeTab==='tasks'?'text-blue-600':'text-slate-400'}`}><i className="fa-solid fa-check-double"></i><span className="text-[10px] mt-1 font-bold">실행</span></button>
                        <button onClick={()=>setActiveTab('report')} className={`flex flex-col items-center w-16 py-1 ${activeTab==='report'?'text-blue-600':'text-slate-400'}`}><i className="fa-solid fa-file-contract"></i><span className="text-[10px] mt-1 font-bold">보고서</span></button>
                        <button onClick={()=>{setTempProfile(profile); setIsProfileModalOpen(true);}} className="flex flex-col items-center w-16 py-1 text-slate-400"><i className="fa-solid fa-user-gear"></i><span className="text-[10px] mt-1 font-bold">프로필</span></button>
                    </nav>

                    {/* Modals */}
                    {isProfileModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
                                <div className="p-4 border-b bg-slate-50 flex justify-between items-center">
                                    <h2 className="font-bold">프로필 설정</h2>
                                    <button onClick={()=>setIsProfileModalOpen(false)}><i className="fa-solid fa-xmark text-slate-400"></i></button>
                                </div>
                                <form onSubmit={handleSaveProfile} className="p-5 space-y-4">
                                    <div className="flex gap-2">
                                        <div className="flex-1"><label className="block text-xs font-bold mb-1">이름</label><input required value={tempProfile.name} onChange={e=>setTempProfile({...tempProfile, name:e.target.value})} className="w-full border rounded-lg p-2 text-sm" /></div>
                                        <div className="flex-1"><label className="block text-xs font-bold mb-1">학번</label><input value={tempProfile.studentId} onChange={e=>setTempProfile({...tempProfile, studentId:e.target.value})} className="w-full border rounded-lg p-2 text-sm" /></div>
                                    </div>
                                    <div><label className="block text-xs font-bold mb-1">학년/학기</label><input required value={tempProfile.yearSemester} onChange={e=>setTempProfile({...tempProfile, yearSemester:e.target.value})} className="w-full border rounded-lg p-2 text-sm" /></div>
                                    <div><label className="block text-xs font-bold mb-1">목표 비전 (트랙)</label><input required value={tempProfile.regionGoal} onChange={e=>setTempProfile({...tempProfile, regionGoal:e.target.value})} className="w-full border rounded-lg p-2 text-sm" /></div>
                                    <button type="submit" className="w-full bg-slate-900 text-white font-bold p-3 rounded-lg mt-2">저장</button>
                                </form>
                            </div>
                        </div>
                    )}
                    
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
                                <div className="p-4 border-b bg-slate-50 flex justify-between items-center">
                                    <h2 className="font-bold">{editingKpiId ? 'KPI 수정' : 'KPI 추가'}</h2>
                                    <button onClick={()=>setIsModalOpen(false)}><i className="fa-solid fa-xmark text-slate-400"></i></button>
                                </div>
                                <form onSubmit={handleSubmitKpi} className="p-5 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold mb-2">자산 카테고리 (Life SCM)</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {Object.entries(categoryInfo).map(([k, i]) => (
                                                <button key={k} type="button" onClick={()=>setNewKpi({...newKpi, category:k})} className={`p-2 rounded-lg border text-xs font-bold flex flex-col items-center gap-1.5 ${newKpi.category===k ? i.bg+' '+i.color+' '+i.border : 'border-slate-200 text-slate-500'}`}>
                                                    <i className={`fa-solid ${i.icon}`}></i> {i.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div><label className="block text-xs font-bold mb-1">목표명</label><input required value={newKpi.title} onChange={e=>setNewKpi({...newKpi, title:e.target.value})} className="w-full border rounded-lg p-2 text-sm" /></div>
                                    <div className="flex gap-2">
                                        <div className="flex-1"><label className="block text-xs font-bold mb-1">목표수치</label><input type="number" required min="1" value={newKpi.target} onChange={e=>setNewKpi({...newKpi, target:e.target.value})} className="w-full border rounded-lg p-2 text-sm" /></div>
                                        <div className="flex-1"><label className="block text-xs font-bold mb-1">단위</label><input required value={newKpi.unit} onChange={e=>setNewKpi({...newKpi, unit:e.target.value})} className="w-full border rounded-lg p-2 text-sm" /></div>
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        {editingKpiId && <button type="button" onClick={()=>handleDeleteKpi(editingKpiId)} className="bg-red-50 text-red-600 px-4 rounded-lg font-bold"><i className="fa-solid fa-trash"></i></button>}
                                        <button type="submit" className="flex-1 bg-blue-600 text-white font-bold p-3 rounded-lg">저장</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                    
                    {toastMessage && <div className="fixed bottom-20 md:bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg z-[60]"><i className="fa-solid fa-check text-green-400 mr-2"></i>{toastMessage}</div>}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
